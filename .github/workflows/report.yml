name: Companion report

on:
  push:
    paths: ['docs/**', 'MultiViewIdentifiability/**']
  pull_request:
    paths: ['docs/**', 'MultiViewIdentifiability/**']
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Lean references resolve
        run: python3 docs/check-refs.py
      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: docs/formalization.tex
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: formalization-report
          path: docs/formalization.pdf
